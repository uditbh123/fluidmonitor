<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirm Delete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand fw-bold">Fluid Monitor</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card mx-auto border-danger" style="max-width: 500px;">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Confirm Delete</h5>
            </div>
            <div class="card-body text-center">
                <p class="mb-1">You are about to delete this reading:</p>
                <h5 class="text-danger my-3">
                    {{ reading.sensor_name }} — {{ reading.value }} {{ reading.unit }}
                </h5>
                <p class="text-muted small">Recorded at {{ reading.recorded_at|date:"d M Y, H:i" }}</p>
                <p class="mb-4">This action cannot be undone.</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                    <a href="/" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
